name: Enterprise Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint dev debug
        run: ./gradlew :app:lintDevDebug :editor-core:test :ai-assistant:test
      - name: Generate SBOM and license inventory
        run: ./gradlew :app:generateSbom :app:generateLicenseReport
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          path: |
            app/build/reports/release/**
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml

  instrumentation-and-benchmark:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build dev debug APK and tests
        run: ./gradlew :app:assembleDevDebug :app:assembleDevDebugAndroidTest
      - name: Run instrumentation smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: ./gradlew :app:connectedDevDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.aymanelbanhawy.enterprisepdf.app.smoke.CriticalWorkflowSmokeTest
      - name: Run benchmark test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: ./gradlew :app:connectedDevDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.aymanelbanhawy.enterprisepdf.app.diagnostics.LargeDocumentOpenBenchmarkTest

  static-analysis:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
      - name: Upload SARIF from lint when present
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: app/build/reports/lint-results-devDebug.sarif
          category: android-lint

  release-artifact:
    runs-on: ubuntu-latest
    needs: [lint-and-unit]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    env:
      ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/release-signing.jks
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Materialize signing keystore
        if: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_SIGNING_STORE_FILE"
      - name: Build prod release bundle
        run: ./gradlew :app:bundleProdRelease :app:assembleProdRelease
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-artifacts
          path: |
            app/build/outputs/apk/prod/release/*.apk
            app/build/outputs/bundle/prodRelease/*.aab
