tasks.register('generateSbom') {
    notCompatibleWithConfigurationCache('Uses declared dependency inventory reporting')
    group = 'reporting'
    description = 'Generates a lightweight CycloneDX-style dependency inventory for the declared implementation dependencies.'
    outputs.file(layout.buildDirectory.file('reports/release/sbom.json'))
    doLast {
        def components = project.configurations.getByName('implementation').allDependencies.collect { dependency ->
            [
                group   : dependency.group ?: 'project',
                name    : dependency.name,
                version : dependency.version ?: 'unspecified',
            ]
        }.sort { a, b -> "${a.group}:${a.name}:${a.version}" <=> "${b.group}:${b.name}:${b.version}" }
        def payload = [
            bomFormat   : 'CycloneDX',
            specVersion : '1.5',
            version     : 1,
            metadata    : [
                component: [
                    type   : 'application',
                    name   : 'com.aymanelbanhawy.enterprisepdf.app',
                    version: '1.0.0',
                ],
            ],
            components  : components.collect { dependency ->
                [
                    type   : 'library',
                    name   : dependency.name,
                    group  : dependency.group,
                    version: dependency.version,
                    purl   : "pkg:maven/${dependency.group}/${dependency.name}@${dependency.version}",
                ]
            },
        ]
        def output = layout.buildDirectory.file('reports/release/sbom.json').get().asFile
        output.parentFile.mkdirs()
        output.text = JsonOutput.prettyPrint(JsonOutput.toJson(payload))
    }
}

tasks.register('generateLicenseReport') {
    notCompatibleWithConfigurationCache('Uses declared dependency inventory reporting')
    group = 'reporting'
    description = 'Generates a dependency inventory with license placeholders for enterprise review.'
    outputs.file(layout.buildDirectory.file('reports/release/licenses.csv'))
    doLast {
        def artifacts = project.configurations.getByName('implementation').allDependencies.sort { a, b ->
            "${a.group ?: 'project'}:${a.name}:${a.version ?: 'unspecified'}" <=> "${b.group ?: 'project'}:${b.name}:${b.version ?: 'unspecified'}"
        }
        def output = layout.buildDirectory.file('reports/release/licenses.csv').get().asFile
        output.parentFile.mkdirs()
        output.text = 'group,name,version,license,status\n'
        artifacts.each { artifact ->
            output << "${artifact.group ?: 'project'},${artifact.name},${artifact.version ?: 'unspecified'},UNKNOWN,review-required\n"
        }
    }
}

tasks.register('printReleaseConfig') {
    notCompatibleWithConfigurationCache('Reads environment and local signing properties')
    group = 'help'
    description = 'Prints resolved production release endpoints without exposing secrets.'
    doLast {
        println "Environment: ${defaultConfigByFlavor('prod', 'environment')}"
        println "Tenant URL: ${defaultConfigByFlavor('prod', 'tenantBaseUrl')}"
        println "AI URL: ${defaultConfigByFlavor('prod', 'aiBaseUrl')}"
        println "Collaboration URL: ${defaultConfigByFlavor('prod', 'collaborationBaseUrl')}"
        println "Has signing keystore: ${!secureConfig('ANDROID_SIGNING_STORE_FILE').isBlank()}"
        println "Has certificate pins: ${!secureConfig('CERTIFICATE_PIN_SET').isBlank()}"
    }
}


