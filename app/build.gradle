def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

def secureConfig = { String key, String fallback = '' ->
    def value = System.getenv(key)
    if (value != null && !value.isBlank()) {
        return value
    }
    if (project.hasProperty(key) && project.property(key)?.toString()?.isBlank() == false) {
        return project.property(key).toString()
    }
    return localProperties.getProperty(key, fallback)
}

def secureBoolean = { String key, boolean fallback = false ->
    return secureConfig(key, String.valueOf(fallback)).toBoolean()
}

def quoted = { String value ->
    return "\"${value.replace('\\', '\\\\').replace('"', '\\"')}\""
}

