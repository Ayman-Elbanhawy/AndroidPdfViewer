            manifestPlaceholders.appLabel = defaultConfigByFlavor('prod', 'appName')
            manifestPlaceholders.appUsesCleartextTraffic = String.valueOf(defaultConfigByFlavor('prod', 'cleartextPermitted'))
            buildConfigField 'String', 'APP_ENVIRONMENT', quoted(defaultConfigByFlavor('prod', 'environment'))
