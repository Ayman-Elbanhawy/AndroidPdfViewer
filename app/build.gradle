def defaultConfigByFlavor = { String flavorName, String key ->
    return flavorConfig[flavorName][key]
}

android {
    namespace 'com.aymanelbanhawy.enterprisepdf.app'
    compileSdk 36

    defaultConfig {
        applicationId 'com.aymanelbanhawy.enterprisepdf.app'
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName '1.0.0'
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        testInstrumentationRunnerArguments['clearPackageData'] = 'true'
        vectorDrawables.useSupportLibrary = true

        buildConfigField 'boolean', 'SECURE_LOGGING_ENABLED', 'true'
        buildConfigField 'String', 'CERTIFICATE_PIN_SET', quoted(secureConfig('CERTIFICATE_PIN_SET', ''))
        buildConfigField 'boolean', 'ENABLE_MANAGED_CONFIG', 'true'
        buildConfigField 'String', 'SUPPORT_BUNDLE_CONTACT', quoted(secureConfig('SUPPORT_BUNDLE_CONTACT', 'security@example.invalid'))
        manifestPlaceholders = [
            appLabel                : 'Enterprise PDF',
            appUsesCleartextTraffic : 'false',
        ]
    }

    signingConfigs {
        release {
            def storeFilePath = secureConfig('ANDROID_SIGNING_STORE_FILE')
            if (!storeFilePath.isBlank()) {
                storeFile file(storeFilePath)
                storePassword secureConfig('ANDROID_SIGNING_STORE_PASSWORD')
                keyAlias secureConfig('ANDROID_SIGNING_KEY_ALIAS')
                keyPassword secureConfig('ANDROID_SIGNING_KEY_PASSWORD')
            }
            enableV1Signing true
            enableV2Signing true
        }
    }

    flavorDimensions += ['deployment']
    productFlavors {
        dev {
            dimension 'deployment'
            applicationIdSuffix defaultConfigByFlavor('dev', 'appIdSuffix')
            versionNameSuffix defaultConfigByFlavor('dev', 'versionNameSuffix')
            manifestPlaceholders.appLabel = defaultConfigByFlavor('dev', 'appName')
            manifestPlaceholders.appUsesCleartextTraffic = String.valueOf(defaultConfigByFlavor('dev', 'cleartextPermitted'))
            buildConfigField 'String', 'APP_ENVIRONMENT', quoted(defaultConfigByFlavor('dev', 'environment'))
            buildConfigField 'String', 'TENANT_BASE_URL', quoted(defaultConfigByFlavor('dev', 'tenantBaseUrl'))
            buildConfigField 'String', 'AI_BASE_URL', quoted(defaultConfigByFlavor('dev', 'aiBaseUrl'))
            buildConfigField 'String', 'COLLABORATION_BASE_URL', quoted(defaultConfigByFlavor('dev', 'collaborationBaseUrl'))
            buildConfigField 'boolean', 'AI_CLOUD_DEFAULT_ENABLED', String.valueOf(defaultConfigByFlavor('dev', 'aiCloudDefault'))
            buildConfigField 'String', 'DEFAULT_EXPORT_WATERMARK', quoted(defaultConfigByFlavor('dev', 'defaultWatermark'))
            resValue 'string', 'app_name', defaultConfigByFlavor('dev', 'appName')
        }
        qa {
            dimension 'deployment'
            applicationIdSuffix defaultConfigByFlavor('qa', 'appIdSuffix')
            versionNameSuffix defaultConfigByFlavor('qa', 'versionNameSuffix')
            manifestPlaceholders.appLabel = defaultConfigByFlavor('qa', 'appName')
            manifestPlaceholders.appUsesCleartextTraffic = String.valueOf(defaultConfigByFlavor('qa', 'cleartextPermitted'))
            buildConfigField 'String', 'APP_ENVIRONMENT', quoted(defaultConfigByFlavor('qa', 'environment'))
            buildConfigField 'String', 'TENANT_BASE_URL', quoted(defaultConfigByFlavor('qa', 'tenantBaseUrl'))
            buildConfigField 'String', 'AI_BASE_URL', quoted(defaultConfigByFlavor('qa', 'aiBaseUrl'))
            buildConfigField 'String', 'COLLABORATION_BASE_URL', quoted(defaultConfigByFlavor('qa', 'collaborationBaseUrl'))
            buildConfigField 'boolean', 'AI_CLOUD_DEFAULT_ENABLED', String.valueOf(defaultConfigByFlavor('qa', 'aiCloudDefault'))
            buildConfigField 'String', 'DEFAULT_EXPORT_WATERMARK', quoted(defaultConfigByFlavor('qa', 'defaultWatermark'))
            resValue 'string', 'app_name', defaultConfigByFlavor('qa', 'appName')
        }
        prod {
